<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Gaming Cafe • Abohar</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --neon: #00ffcc;
            --dark: #0a0a1f;
            --gray: #1a1a2e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: #ddd;
            overflow-x: hidden;
        }
        h1, h2, .logo, .gothic { font-family: 'Anton', sans-serif; letter-spacing: 4px; }
        .title { font-family: 'Oswald', sans-serif; }

        header {
            background: rgba(10,10,31,0.95);
            position: fixed;
            width: 100%;
            z-index: 1000;
            border-bottom: 4px solid var(--neon);
        }
        nav { max-width: 1400px; margin: auto; padding: 1.2rem 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 2.8rem; color: var(--neon); text-shadow: 0 0 25px var(--neon); }

        /* HOMEPAGE */
        .home {
            min-height: 100vh;
            background: linear-gradient(rgba(10,10,31,0.85), rgba(10,10,31,0.9)), url('https://picsum.photos/id/1015/1920/1080') center/cover fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 80px;
        }
        .hero-content {
            max-width: 1100px;
            padding: 0 20px;
        }
        .hero-content h1 {
            font-size: 5.5rem;
            color: white;
            text-shadow: 0 0 40px var(--neon);
            margin-bottom: 20px;
        }
        .hero-content p {
            font-size: 1.8rem;
            max-width: 800px;
            margin: 0 auto 40px;
            color: #ccc;
        }
        .book-btn {
            background: transparent;
            color: var(--neon);
            border: 4px solid var(--neon);
            padding: 22px 70px;
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .book-btn:hover {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 60px var(--neon);
            transform: scale(1.05);
        }

        /* BOOKING PAGE */
        .booking-page {
            display: none;
            min-height: 100vh;
            background: var(--gray);
            padding: 100px 20px 60px;
        }
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: none;
            border: none;
            color: var(--neon);
            font-size: 1.5rem;
            cursor: pointer;
        }

        section { max-width: 1400px; margin: 0 auto; padding: 80px 30px; }
        h2 { font-size: 3.5rem; text-align: center; color: var(--neon); margin-bottom: 50px; }

        form {
            background: #111827;
            padding: 50px;
            border-radius: 20px;
            border: 3px solid var(--neon);
            max-width: 700px;
            margin: 0 auto;
        }
        input, select {
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            background: #1f2937;
            border: 2px solid #475569;
            color: white;
            border-radius: 10px;
            font-size: 1.2rem;
        }
        button {
            width: 100%;
            padding: 22px;
            background: var(--neon);
            color: #000;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .thankyou {
            text-align: center;
            font-size: 1.8rem;
            color: #aaa;
            margin: 60px auto;
            max-width: 900px;
        }
    </style>
</head>
<body>

    <!-- HOMEPAGE -->
    <div id="home-page">
        <header>
            <nav>
                <div class="logo">OG GAMING CAFE</div>
            </nav>
        </header>

        <div class="home">
            <div class="hero-content">
                <h1 class="gothic">OG GAMING CAFE</h1>
                <p class="title">ABOHAR'S PREMIUM GAMING ARENA • WHERE LEGENDS PLAY</p>
                <button class="book-btn" onclick="showBookingPage()">BOOK YOUR SLOT NOW</button>
            </div>
        </div>

        <section>
            <h2>Experience The Arena</h2>
            <!-- You can add more aesthetic content here later -->
            <div class="thankyou">
                Thank you for visiting OG Gaming Cafe.<br>
                We are grateful to be part of Abohar's gaming community.<br>
                Let's create unforgettable battles together! 🔥🎮
            </div>
        </section>
    </div>

    <!-- BOOKING PAGE -->
    <div id="booking-page" class="booking-page">
        <button class="back-btn" onclick="showHomePage()">← Back to Home</button>
        
        <h2 class="gothic">BOOK YOUR SLOT</h2>
        <form id="booking-form">
            <select id="pc-select" required></select>
            <input type="date" id="date" required>
            <input type="time" id="time" required>
            <select id="duration" required>
                <option value="1">1 Hour - ₹100</option>
                <option value="2">2 Hours - ₹180</option>
                <option value="3">3 Hours - ₹250</option>
            </select>
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="tel" id="phone" placeholder="WhatsApp Number" required>
            <button type="submit">CONFIRM BOOKING</button>
        </form>
    </div>

    <script>
        function showBookingPage() {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('booking-page').style.display = 'block';
        }

        function showHomePage() {
            document.getElementById('booking-page').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
        }

        // PC options
        const pcs = ["PC-1 - RTX 4060 Beast", "PC-2 - High End RGB", "PC-3 - Ultimate Setup", "PC-4 - Console Zone"];
        const select = document.getElementById('pc-select');
        select.innerHTML = '<option value="">Select PC</option>' + 
            pcs.map((pc, i) => `<option value="${i+1}">${pc}</option>`).join('');

        document.getElementById('booking-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('✅ Booking Confirmed! Thank you for choosing OG Gaming Cafe. We will contact you soon.');
            this.reset();
            showHomePage();
        });
    </script>
</body>
</html>
